[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: any unknown route serves index.html so React handles it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache hashed asset files aggressively — they have content hashes in the filename
# so they're safe to cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"